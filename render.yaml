# Render Blueprint — one-click deploy to Render.com
# Docs: https://render.com/docs/blueprint-spec
#
# After pushing this repo to GitHub/GitLab, create a new Blueprint on Render
# pointing to this file. Render auto-detects the static-site service.

services:
  - type: web
    name: test-your-product-with-engineer-abdulaziz
    runtime: static
    # Build from the app/ subdirectory
    buildCommand: cd app && npm ci && npm run build
    staticPublishPath: ./app/dist
    autoDeploy: true
    pullRequestPreviewsEnabled: true
    envVars:
      - key: NODE_VERSION
        value: "20"
      # Uncomment and set in the Render dashboard when you wire a real AI proxy.
      # - key: VITE_CLAUDE_PROXY_URL
      #   sync: false
      # - key: VITE_CLAUDE_MODEL
      #   sync: false
    headers:
      # Strong security headers for a modern SPA
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: Permissions-Policy
        value: "camera=(), microphone=(), geolocation=()"
      - path: /assets/*
        name: Cache-Control
        value: "public, max-age=31536000, immutable"
    routes:
      # SPA fallback — every path should serve index.html
      - type: rewrite
        source: /*
        destination: /index.html
